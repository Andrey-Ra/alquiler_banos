<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Sistema de Alquiler</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body{
            background:#f5f7fa;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
            overflow:hidden;
        }

        .login-header{
            background:#212529;
            color:white;
            text-align:center;
            padding:30px;
        }

        .login-header h3{
            margin:0;
            font-weight:bold;
        }

        .login-body{
            padding:35px;
            background:white;
        }

        .btn-login{
            width:100%;
            padding:12px;
            font-weight:bold;
        }

        .system-name{
            font-size:14px;
            opacity:.8;
        }
    </style>
</head>
<body>

<div class="card login-card">

    <div class="login-header">
        <h3>Sistema de Alquiler</h3>
        <div class="system-name">
            Gestión de baños portátiles
        </div>
    </div>


    <div class="login-body">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}


        <form method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Correo electrónico
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                >
            </div>


            <div class="mb-4">
                <label class="form-label">
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >
            </div>


            <button class="btn btn-dark btn-login">
                Iniciar sesión
            </button>

        </form>

    </div>

</div>

</body>
</html>
