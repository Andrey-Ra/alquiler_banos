{% extends 'base.html' %}
{% block title %}Nuevo Cliente{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Nuevo Cliente</h1>
        <p>Registrar un nuevo cliente en el sistema</p>
    </div>
    <a href="{{ url_for('clientes') }}" class="btn btn-ghost">← Volver</a>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">

      <div class="form-group">
        <label for="nombre">Nombre completo / Razón social</label>
        <input id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
      </div>

      <div class="form-group">
        <label for="tipo">Tipo de cliente</label>
        <select id="tipo" name="tipo" required>
          <option value="particular">Particular</option>
          <option value="empresa">Empresa</option>
        </select>
      </div>

      <div class="form-group">
        <label for="ruc_ci">RUC / Cédula de identidad</label>
        <input id="ruc_ci" name="ruc_ci" placeholder="Ej: 123456789" required>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input id="telefono" name="telefono" placeholder="Ej: 3001234567" required>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" placeholder="Ej: cliente@email.com">
      </div>

      <div class="form-group">
        <label for="direccion">Dirección</label>
        <input id="direccion" name="direccion" placeholder="Ej: Calle 123, Bogotá">
      </div>

    </div>

    <div style="margin-top:24px; display:flex; gap:10px;">
      <button type="submit" class="btn btn-primary">💾 Guardar cliente</button>
      <a href="{{ url_for('clientes') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
